name: CI

on:
  push:
    branches: [main]
  pull_request:

# least-privilege token: every job only checks out and reads
permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      # Voice model (RFC #59): ~44 MB, cached between runs; the fetch script
      # is the cache key, so bumping MODEL_REV/files in it invalidates cleanly.
      # With the model staged, the corpus + privacy voice tests run for real
      # (they skip loudly when it's absent, e.g. on forks with cache misses).
      - uses: actions/cache@v4
        with:
          path: web/public/models
          key: voice-model-${{ hashFiles('web/scripts/fetch-voice-model.mjs') }}
      - run: node scripts/fetch-voice-model.mjs
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  mcp:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            mcp/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm ci
        working-directory: mcp
      - run: npm run typecheck
        working-directory: mcp
      - run: npm test
        working-directory: mcp
      - run: npm run build
        working-directory: mcp
      - run: npm run smoke:dist
        working-directory: mcp

  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 capture/capture_server.py selftest
